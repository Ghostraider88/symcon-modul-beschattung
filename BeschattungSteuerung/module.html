<div class="bs-tile" id="bsTile">
  <div class="bs-head">
    <div class="bs-head-left">
      <div class="bs-name" id="bsName"></div>
      <div class="bs-title">Beschattung</div>
    </div>
    <div class="bs-head-right">
      <div class="bs-toggle-label" id="bsAutomationLabel"></div>
      <label class="bs-toggle">
        <input type="checkbox" id="bsAutomation">
        <span class="bs-knob"></span>
      </label>
    </div>
  </div>

  <div class="bs-gauges">
    <div class="bs-gauge">
      <svg viewBox="0 0 110 110" aria-hidden="true">
        <circle cx="55" cy="55" r="44" class="bs-gtrack"/>
        <circle id="bsGaugeArc" cx="55" cy="55" r="44" class="bs-gfill" transform="rotate(-90 55 55)"/>
        <line x1="55" y1="95" x2="55" y2="104" class="bs-gmark"/>
      </svg>
      <div class="bs-gvalue" id="bsGaugeValue"></div>
      <div class="bs-glabel" id="bsGaugeLabel"></div>
    </div>
    <div class="bs-changes">
      <div class="bs-changes-top">
        <span id="bsChangesLabel"></span>
        <b id="bsChangesValue"></b>
      </div>
      <div class="bs-track">
        <div class="bs-fill" id="bsChangesFill"></div>
        <div class="bs-tick" id="bsTickOff"></div>
        <div class="bs-tick bs-tick-on" id="bsTickOn"></div>
        <span class="bs-ticklbl" id="bsTickOffLbl"></span>
        <span class="bs-ticklbl" id="bsTickOnLbl"></span>
      </div>
      <span class="bs-modechip" id="bsModeChip"></span>
    </div>
  </div>

  <div class="bs-kv" id="bsKv"></div>
</div>

<style>
  .bs-tile {
    --bs-content: #ffffff;
    --bs-accent: var(--accent-color, #0f9c85);
    --bs-text: #23282d;
    --bs-sub: #5b6570;
    --bs-faint: #8a929a;
    --bs-line: rgba(35, 40, 45, 0.12);
    --bs-track: rgba(35, 40, 45, 0.10);
    --bs-sun: #b9820f;
    --bs-sun-soft: rgba(185, 130, 15, 0.14);

    box-sizing: border-box;
    background: var(--bs-content);
    color: var(--bs-text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    font-size: 14px;
    line-height: 1.4;
    padding: 14px 16px;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-variant-numeric: tabular-nums;
  }
  .bs-tile *, .bs-tile *::before, .bs-tile *::after { box-sizing: border-box; }

  .bs-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  .bs-name { font-size: 0.82em; color: var(--bs-sub); margin-bottom: 2px; }
  .bs-title { font-size: 1.15em; font-weight: 700; }
  .bs-head-right { text-align: right; flex: 0 0 auto; }
  .bs-toggle-label { font-size: 0.72em; color: var(--bs-faint); margin-bottom: 3px; }
  .bs-toggle { position: relative; display: inline-block; width: 38px; height: 22px; }
  .bs-toggle input { opacity: 0; width: 100%; height: 100%; margin: 0; position: absolute; z-index: 2; cursor: pointer; }
  .bs-knob { position: absolute; inset: 0; border-radius: 999px; background: var(--bs-track); border: 1px solid var(--bs-line); transition: background 0.15s; }
  .bs-knob::after { content: ""; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; border-radius: 50%; background: var(--bs-content); box-shadow: 0 1px 2px rgba(0,0,0,0.4); transition: transform 0.15s; }
  .bs-toggle input:checked + .bs-knob { background: var(--bs-accent); border-color: var(--bs-accent); }
  .bs-toggle input:checked + .bs-knob::after { transform: translateX(16px); }
  .bs-toggle input:focus-visible + .bs-knob { outline: 2px solid var(--bs-accent); outline-offset: 2px; }

  .bs-gauges { display: flex; gap: 16px; align-items: center; margin: 14px 0 4px; }
  .bs-gauge { flex: 0 0 auto; width: 96px; text-align: center; position: relative; }
  .bs-gauge svg { width: 100%; height: auto; display: block; }
  .bs-gtrack { fill: none; stroke: var(--bs-track); stroke-width: 9; }
  .bs-gfill { fill: none; stroke: var(--bs-sun); stroke-width: 9; stroke-linecap: round; }
  .bs-gmark { stroke: var(--bs-faint); stroke-width: 2; }
  .bs-gvalue { position: absolute; top: 34%; left: 0; right: 0; font-size: 1.15em; font-weight: 700; }
  .bs-glabel { position: absolute; top: 58%; left: 0; right: 0; font-size: 0.62em; color: var(--bs-faint); padding: 0 6px; }

  .bs-changes { flex: 1 1 auto; min-width: 0; }
  .bs-changes-top { display: flex; justify-content: space-between; align-items: baseline; font-size: 0.86em; color: var(--bs-sub); }
  .bs-changes-top b { color: var(--bs-text); font-size: 1.15em; }
  .bs-track { position: relative; height: 5px; border-radius: 3px; background: var(--bs-track); margin-top: 9px; }
  .bs-fill { position: absolute; top: 0; bottom: 0; left: 0; border-radius: 3px; background: var(--bs-sun); opacity: 0.85; }
  .bs-tick { position: absolute; top: -3px; bottom: -3px; width: 2px; background: var(--bs-faint); }
  .bs-tick-on { background: var(--bs-text); }
  .bs-ticklbl { position: absolute; top: 8px; font-size: 0.66em; color: var(--bs-faint); transform: translateX(-50%); white-space: nowrap; }
  .bs-modechip { display: inline-block; margin-top: 20px; font-size: 0.78em; font-weight: 600; border-radius: 999px; padding: 2px 9px; background: var(--bs-track); color: var(--bs-sub); }
  .bs-modechip.bs-active { background: var(--bs-sun-soft); color: var(--bs-sun); }

  .bs-kv { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 14px; margin-top: 14px; padding-top: 10px; border-top: 1px solid var(--bs-line); font-size: 0.78em; }
  .bs-kv div { display: flex; justify-content: space-between; gap: 6px; }
  .bs-kv span { color: var(--bs-faint); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bs-kv b { font-weight: 600; white-space: nowrap; }

  .bs-tile.bs-compact .bs-kv { display: none; }

  @media (prefers-color-scheme: dark) {
    .bs-tile {
      --bs-content: #1d2126;
      --bs-accent: var(--accent-color, #17bfa4);
      --bs-text: #e8ecef;
      --bs-sub: #9aa4ad;
      --bs-faint: #6f7982;
      --bs-line: rgba(232, 236, 239, 0.12);
      --bs-track: rgba(232, 236, 239, 0.10);
      --bs-sun: #f0be47;
      --bs-sun-soft: rgba(240, 190, 71, 0.16);
    }
  }
</style>

<script>
(function () {
  var root = document.getElementById('bsTile');
  var cfg = (typeof _config !== 'undefined' && _config && _config.labels) ? _config.labels : {};
  var L = function (key, fallback) { return cfg[key] || fallback; };

  function num(v, digits) {
    if (v === null || v === undefined || isNaN(v)) { return '–'; }
    return Number(v).toLocaleString('de-DE', { minimumFractionDigits: digits, maximumFractionDigits: digits });
  }
  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
  function pct(v, lo, hi) {
    if (hi <= lo) { return 0; }
    return clamp(((v - lo) / (hi - lo)) * 100, 0, 100);
  }
  function timeOfDay(sec) {
    if (sec === null || sec === undefined) { return '–'; }
    var h = Math.floor(sec / 3600);
    var m = Math.floor((sec % 3600) / 60);
    return (h < 10 ? '0' : '') + h + ':' + (m < 10 ? '0' : '') + m;
  }
  function duration(sec) {
    var m = Math.floor(sec / 60);
    var s = Math.round(sec % 60);
    if (m > 0) { return m + ':' + (s < 10 ? '0' : '') + s + ' min'; }
    return s + ' s';
  }

  var GAUGE_R = 44;
  var GAUGE_C = 2 * Math.PI * GAUGE_R;

  function renderGauge(d) {
    var frac = clamp(d.sunPercentage, 0, 100) / 100;
    var arc = root.querySelector('#bsGaugeArc');
    arc.style.strokeDasharray = (frac * GAUGE_C).toFixed(1) + ' ' + GAUGE_C.toFixed(1);
    root.querySelector('#bsGaugeValue').textContent = num(d.sunPercentage, 0) + ' %';
    root.querySelector('#bsGaugeLabel').textContent = L('sunPercentage', 'Sonnenanteil');
  }

  function renderChanges(d) {
    root.querySelector('#bsChangesLabel').textContent = '🔀 ' + L('changes', 'Helligkeitswechsel') + ' (' + d.windowMinutes + ' min)';
    root.querySelector('#bsChangesValue').textContent = d.changes;
    var hi = Math.max(d.changes, d.limitOn) * 1.25 || 1;
    root.querySelector('#bsChangesFill').style.width = pct(d.changes, 0, hi).toFixed(1) + '%';
    var offPct = pct(d.limitOff, 0, hi);
    var onPct = pct(d.limitOn, 0, hi);
    root.querySelector('#bsTickOff').style.left = offPct.toFixed(1) + '%';
    root.querySelector('#bsTickOn').style.left = onPct.toFixed(1) + '%';
    root.querySelector('#bsTickOffLbl').style.left = offPct.toFixed(1) + '%';
    root.querySelector('#bsTickOffLbl').textContent = 'Aus <' + d.limitOff;
    root.querySelector('#bsTickOnLbl').style.left = onPct.toFixed(1) + '%';
    root.querySelector('#bsTickOnLbl').textContent = 'Ein ≥' + d.limitOn;

    var chip = root.querySelector('#bsModeChip');
    chip.classList.toggle('bs-active', !!d.cloudMode);
    chip.textContent = (d.cloudMode ? '⛅ ' : '☀️ ') + (d.cloudMode ? L('alternativeModeOn', 'Alternativmodus AN') : L('alternativeModeOff', 'Alternativmodus AUS'));
  }

  function kvRow(label, value) {
    return '<div><span>' + label + '</span><b>' + value + '</b></div>';
  }

  function renderKv(d) {
    var rows = [];
    rows.push(kvRow('☀️ ' + L('sensor', 'Sensor'), d.sensorValue === null ? '–' : num(d.sensorValue, 0)));
    rows.push(kvRow(L('sunnyThreshold', 'Sonnig-Schwelle'), num(d.sunnyThreshold, 0)));
    rows.push(kvRow('⏰ ' + L('timeWindow', 'Zeitfenster'), timeOfDay(d.earliestSec) + '–' + timeOfDay(d.latestSec)));
    rows.push(kvRow('🔒 ' + L('lockTime', 'Sperrzeit'), duration(d.lockTime)));
    rows.push(kvRow('🌡️ ' + L('outdoorThresholds', 'Außenschwellen'), num(d.tempOn, 1) + '/' + num(d.tempOff, 1) + ' °C'));
    rows.push(kvRow('🔥 ' + L('allAroundFrom', 'Rundum ab'), num(d.tempAllAround, 1) + ' °C'));
    rows.push(kvRow('🏠 ' + L('indoorRange', 'Innenbereich'), num(d.indoorMin, 1) + '–' + num(d.indoorMax, 1) + ' °C'));
    rows.push(kvRow('💡 ' + L('brightnessThresholds', 'Helligkeitsschwellen'), num(d.brightnessOn, 0) + '/' + num(d.brightnessOff, 0)));
    root.querySelector('#bsKv').innerHTML = rows.join('');
  }

  function render(d) {
    root.querySelector('#bsName').textContent = d.name || '';
    root.querySelector('#bsAutomationLabel').textContent = L('automation', 'Automatik global');
    root.querySelector('#bsAutomation').checked = !!d.automationGlobal;
    renderGauge(d);
    renderChanges(d);
    renderKv(d);
  }

  var autoInputEl = root.querySelector('#bsAutomation');
  autoInputEl.addEventListener('change', function () {
    if (typeof requestAction === 'function') {
      requestAction('AutomationGlobal', autoInputEl.checked);
    }
  });

  if (typeof ResizeObserver !== 'undefined') {
    var ro = new ResizeObserver(function (entries) {
      for (var i = 0; i < entries.length; i++) {
        var h = entries[i].contentRect.height;
        var w = entries[i].contentRect.width;
        root.classList.toggle('bs-compact', h < 200 || w < 190);
        root.style.fontSize = Math.max(10, Math.min(16, h / 22, w / 26)).toFixed(2) + 'px';
      }
    });
    ro.observe(root);
  }

  window.handleMessage = function (data) {
    if (typeof data === 'string') {
      try { data = JSON.parse(data); } catch (e) { return; }
    }
    if (!data || typeof data !== 'object') { return; }
    render(data);
  };
})();
</script>
